pipeline:
  name: Dependency Security Scan
  identifier: dependency_security_scan
  projectIdentifier: REPLACE_PROJECT_ID   # REPLACE: your Harness project identifier
  orgIdentifier: REPLACE_ORG_ID           # REPLACE: your Harness org identifier
  properties:
    ci:
      codebase:
        connectorRef: <+input>            # REPLACE at runtime: your Git connector
        repoName: ci-tidbits-security-scan
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Scan
        identifier: scan
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Trivy Dependency Scan
                  identifier: trivy_scan
                  type: Run
                  spec:
                    # Pinned image so the demo is reproducible next Tuesday.
                    image: aquasec/trivy:0.55.2
                    shell: Sh
                    command: |-
                      echo "=== Trivy: scanning dependencies for known CVEs ==="
                      trivy fs \
                        --scanners vuln \
                        --severity CRITICAL,HIGH \
                        --exit-code 1 \
                        --no-progress \
                        --ignore-unfixed \
                        .
        variables: []
  variables: []
